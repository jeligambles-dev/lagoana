[build]
builder = "nixpacks"

[build.nixpacks]
buildCmd = "npx prisma generate && node node_modules/next/dist/bin/next build"

[deploy]
startCommand = "npx prisma db push --skip-generate && node .next/standalone/server.js"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
